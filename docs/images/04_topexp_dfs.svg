<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">TopExp Explorer DFS stack</title>
  <desc id="desc">Topology hierarchy is traversed with iterator stack and selected shapes are added to IndexedMap.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#31546f"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#1b2a34" flood-opacity=".14"/></filter>
    <style>
      .bg{fill:#f8fafb}.title{font:700 25px Arial,"Microsoft YaHei";fill:#203447}
      .node{fill:#fff;stroke:#d4dee5;stroke-width:1.3;filter:url(#shadow)}.hit{fill:#fff4df;stroke:#d9b36d;stroke-width:1.4;filter:url(#shadow)}
      .stack{fill:#eef1fb;stroke:#9babd7;stroke-width:1.2}.map{fill:#eaf5ee;stroke:#9ec7ab;stroke-width:1.2}
      .h{font:700 16px Arial,"Microsoft YaHei";fill:#233747}.t{font:14px Arial,"Microsoft YaHei";fill:#465d6b}.m{font:13px Consolas,monospace;fill:#334b5a}
      .line{stroke:#31546f;stroke-width:2;fill:none;marker-end:url(#arrow)}.weak{stroke:#9dafba;stroke-width:1.5;fill:none}
    </style>
  </defs>
  <rect width="980" height="560" class="bg"/>
  <text x="44" y="50" class="title">TopExp_Explorer: DFS 遍历 + IndexedMap 去重编号</text>
  <g transform="translate(52 94)">
    <rect class="node" x="250" y="0" width="130" height="44" rx="7"/><text x="286" y="28" class="h">SOLID</text>
    <rect class="node" x="95" y="88" width="130" height="44" rx="7"/><text x="134" y="116" class="h">SHELL</text>
    <rect class="hit" x="0" y="176" width="130" height="44" rx="7"/><text x="42" y="204" class="h">FACE 1</text>
    <rect class="hit" x="185" y="176" width="130" height="44" rx="7"/><text x="227" y="204" class="h">FACE 2</text>
    <rect class="node" x="0" y="264" width="130" height="44" rx="7"/><text x="45" y="292" class="h">EDGE</text>
    <rect class="node" x="185" y="264" width="130" height="44" rx="7"/><text x="230" y="292" class="h">EDGE</text>
    <path class="weak" d="M315 44 L160 88 M160 132 L65 176 M160 132 L250 176 M65 220 L65 264 M250 220 L250 264"/>
  </g>
  <g transform="translate(492 104)">
    <rect class="node" width="200" height="302" rx="8"/>
    <text x="24" y="34" class="h">Explorer stack</text>
    <rect x="28" y="74" width="144" height="38" rx="6" class="stack"/><text x="46" y="98" class="m">TopoDS_Iterator</text>
    <rect x="28" y="128" width="144" height="38" rx="6" class="stack"/><text x="46" y="152" class="m">TopoDS_Iterator</text>
    <rect x="28" y="182" width="144" height="38" rx="6" class="stack"/><text x="46" y="206" class="m">TopoDS_Iterator</text>
    <text x="28" y="252" class="t">Next(): push / pop</text>
    <text x="28" y="274" class="t">Current(): 命中目标类型</text>
  </g>
  <g transform="translate(746 104)">
    <rect class="node" width="184" height="302" rx="8"/>
    <text x="24" y="34" class="h">IndexedMap</text>
    <rect x="24" y="78" width="136" height="36" rx="6" class="map"/><text x="42" y="101" class="m">1 -> FACE 1</text>
    <rect x="24" y="132" width="136" height="36" rx="6" class="map"/><text x="42" y="155" class="m">2 -> FACE 2</text>
    <text x="24" y="218" class="t">重复 shape:</text>
    <text x="24" y="240" class="t">Add() 返回已有 index</text>
  </g>
  <path class="line" d="M365 197 C435 200 450 156 492 156"/>
  <path class="line" d="M692 194 C720 194 722 194 746 194"/>
</svg>
