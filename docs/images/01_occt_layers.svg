<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">OCCT data structure layers</title>
  <desc id="desc">Layered view from OCCT modules to common data structure patterns.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#102033" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#31546f"/>
    </marker>
    <style>
      .bg{fill:#f7f9fb}.card{fill:#fff;stroke:#d8e1e8;stroke-width:1.3;filter:url(#shadow)}
      .head{font:700 25px Arial,"Microsoft YaHei",sans-serif;fill:#213547}
      .label{font:700 17px Arial,"Microsoft YaHei",sans-serif;fill:#243746}
      .text{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#415667}
      .small{font:12px Consolas,"Microsoft YaHei",monospace;fill:#526878}
      .chip{fill:#e8f1f4;stroke:#bdd2dc;stroke-width:1}
      .a{fill:#eaf5ee}.b{fill:#fff4df}.c{fill:#eef1fb}.d{fill:#f7edf2}
      .line{stroke:#31546f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="980" height="520" rx="0" class="bg"/>
  <text x="46" y="52" class="head">OCCT 中的数据结构不是孤立练习，而是内核协作层</text>
  <g transform="translate(46 88)">
    <rect class="card a" width="210" height="116" rx="8"/>
    <text x="22" y="35" class="label">ModelingData</text>
    <text x="22" y="62" class="text">TopoDS_Shape</text>
    <text x="22" y="84" class="text">TopExp / TopTools</text>
  </g>
  <g transform="translate(300 88)">
    <rect class="card b" width="210" height="116" rx="8"/>
    <text x="22" y="35" class="label">Algorithms</text>
    <text x="22" y="62" class="text">BOPAlgo</text>
    <text x="22" y="84" class="text">HLRBRep</text>
  </g>
  <g transform="translate(554 88)">
    <rect class="card c" width="210" height="116" rx="8"/>
    <text x="22" y="35" class="label">Visualization</text>
    <text x="22" y="62" class="text">AIS_InteractiveContext</text>
    <text x="22" y="84" class="text">SelectMgr owners</text>
  </g>
  <g transform="translate(46 260)">
    <rect class="card" width="872" height="172" rx="8"/>
    <text x="28" y="42" class="label">共同的数据结构语言</text>
    <g transform="translate(28 68)">
      <rect class="chip" width="154" height="38" rx="6"/><text x="16" y="25" class="small">Map: 去重 fence</text>
    </g>
    <g transform="translate(202 68)">
      <rect class="chip" width="178" height="38" rx="6"/><text x="16" y="25" class="small">DataMap: key -&gt; value</text>
    </g>
    <g transform="translate(400 68)">
      <rect class="chip" width="190" height="38" rx="6"/><text x="16" y="25" class="small">IndexedMap: key -&gt; id</text>
    </g>
    <g transform="translate(610 68)">
      <rect class="chip" width="224" height="38" rx="6"/><text x="16" y="25" class="small">IndexedDataMap: key -&gt; id + data</text>
    </g>
    <g transform="translate(28 122)">
      <rect class="chip" width="178" height="38" rx="6"/><text x="16" y="25" class="small">List: 一对多结果</text>
    </g>
    <g transform="translate(226 122)">
      <rect class="chip" width="188" height="38" rx="6"/><text x="16" y="25" class="small">Array1: 编号后数组</text>
    </g>
    <g transform="translate(434 122)">
      <rect class="chip" width="160" height="38" rx="6"/><text x="16" y="25" class="small">handle: 生命周期</text>
    </g>
    <g transform="translate(614 122)">
      <rect class="chip" width="220" height="38" rx="6"/><text x="16" y="25" class="small">Explorer stack: 拓扑 DFS</text>
    </g>
  </g>
  <path class="line" d="M151 206 C151 230 245 235 290 260"/>
  <path class="line" d="M405 206 C405 230 445 235 482 260"/>
  <path class="line" d="M659 206 C659 230 650 235 640 260"/>
</svg>
