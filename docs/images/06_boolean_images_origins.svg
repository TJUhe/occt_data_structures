<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">BOPAlgo images and origins maps</title>
  <desc id="desc">Original shapes map to result images; result shapes map back to origins.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#31546f"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#1b2a34" flood-opacity=".14"/></filter>
    <style>
      .bg{fill:#f8fafb}.title{font:700 25px Arial,"Microsoft YaHei";fill:#203447}.card{fill:#fff;stroke:#d4dee5;stroke-width:1.3;filter:url(#shadow)}
      .orig{fill:#fff4df;stroke:#d9b36d;stroke-width:1.4}.res{fill:#eaf5ee;stroke:#8dbc9b;stroke-width:1.4}.map{fill:#eef1fb;stroke:#9babd7;stroke-width:1.2}
      .h{font:700 16px Arial,"Microsoft YaHei";fill:#233747}.t{font:14px Arial,"Microsoft YaHei";fill:#465d6b}.m{font:13px Consolas,monospace;fill:#334b5a}
      .line{stroke:#31546f;stroke-width:2;fill:none;marker-end:url(#arrow)}.back{stroke:#8a5f74;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="980" height="560" class="bg"/>
  <text x="44" y="50" class="title">BOPAlgo_Builder: images 正向记录，origins 反向追溯</text>
  <g transform="translate(56 100)">
    <rect class="card" width="214" height="286" rx="8"/><text x="28" y="36" class="h">输入 shape</text>
    <rect x="38" y="82" width="132" height="46" rx="7" class="orig"/><text x="74" y="111" class="h">Face F1</text>
    <rect x="38" y="172" width="132" height="46" rx="7" class="orig"/><text x="74" y="201" class="h">Face F2</text>
  </g>
  <g transform="translate(386 100)">
    <rect class="card" width="214" height="286" rx="8"/><text x="28" y="36" class="h">结果 shape</text>
    <rect x="38" y="66" width="132" height="42" rx="7" class="res"/><text x="86" y="92" class="h">A</text>
    <rect x="38" y="132" width="132" height="42" rx="7" class="res"/><text x="86" y="158" class="h">B</text>
    <rect x="38" y="198" width="132" height="42" rx="7" class="res"/><text x="86" y="224" class="h">C</text>
  </g>
  <g transform="translate(690 100)">
    <rect class="card" width="238" height="286" rx="8"/><text x="24" y="36" class="h">两张表</text>
    <rect x="24" y="70" width="190" height="54" rx="6" class="map"/><text x="40" y="94" class="m">images[F1] = A,B</text><text x="40" y="112" class="m">images[F2] = B,C</text>
    <rect x="24" y="154" width="190" height="72" rx="6" class="map"/><text x="40" y="178" class="m">origins[A] = F1</text><text x="40" y="196" class="m">origins[B] = F1,F2</text><text x="40" y="214" class="m">origins[C] = F2</text>
  </g>
  <path class="line" d="M226 205 C300 150 320 100 424 87"/>
  <path class="line" d="M226 205 C310 200 325 151 424 153"/>
  <path class="line" d="M226 295 C300 247 330 154 424 153"/>
  <path class="line" d="M226 295 C310 305 330 222 424 219"/>
  <path class="back" d="M518 153 C610 156 624 177 690 180"/>
  <text x="80" y="458" class="t">实例：F1 和 F2 的交界生成共同结果 B。正向表适合回答“我变成了什么”，反向表适合回答“它来自哪里”。</text>
</svg>
